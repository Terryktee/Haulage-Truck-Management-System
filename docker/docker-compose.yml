services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: haulage_backend
    working_dir: /app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../backend/app:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: haulage_frontend
    volumes:
      - ../frontend:/frontend
      - /frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend