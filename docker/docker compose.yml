version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: docker/Dockerfile.backend
    container_name: haulage_backend
    working_dir: /app
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../backend/app:/app
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: docker/Dockerfile.frontend
    container_name: haulage_frontend
    volumes:
      - ../frontend:/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend